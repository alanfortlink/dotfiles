# === vim-centric customizations ===

# 1. SUPER + hjkl: focus window in direction
#    overrides: SUPER+J=toggle split, SUPER+K=show keybindings, SUPER+L=toggle workspace layout
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
bindd = SUPER, H, Focus left,  movefocus, l
bindd = SUPER, J, Focus down,  movefocus, d
bindd = SUPER, K, Focus up,    movefocus, u
bindd = SUPER, L, Focus right, movefocus, r

# 3. CTRL + SUPER + hjkl: swap window in direction
#    overrides: SUPER+CTRL+H=Hardware menu, SUPER+CTRL+L=Lock system
unbind = SUPER CTRL, H
unbind = SUPER CTRL, L
bindd = SUPER CTRL, H, Swap window left,  swapwindow, l
bindd = SUPER CTRL, J, Swap window down,  swapwindow, d
bindd = SUPER CTRL, K, Swap window up,    swapwindow, u
bindd = SUPER CTRL, L, Swap window right, swapwindow, r

# 2. CTRL + SUPER + S: move active window to next monitor and follow focus
#    overrides: SUPER+CTRL+S=Share menu
unbind = SUPER CTRL, S
bindd = SUPER CTRL, S, Move window to next monitor, exec, hyprctl --batch "dispatch movewindow mon:+1 ; dispatch focusmonitor +1"

# 4. ALT + SPACE: app launcher (walker), moved off SUPER+SPACE
unbind = SUPER, SPACE
bindd = ALT, SPACE, Launch apps, exec, omarchy-launch-walker

# 5. SUPER + TAB: launch or focus ghostty terminal
#    overrides: SUPER+TAB=Next workspace
unbind = SUPER, TAB
bindd = SUPER, TAB, Ghostty terminal, exec, omarchy-launch-or-focus ghostty

# 6. SUPER + SHIFT + hjkl: resize active window in direction
#    h: narrower (right edge moves left)   l: wider  (right edge moves right)
#    k: shorter  (bottom edge moves up)    j: taller (bottom edge moves down)
bindd = SUPER SHIFT, H, Resize narrower, resizeactive, -100 0
bindd = SUPER SHIFT, J, Resize taller,   resizeactive, 0 100
bindd = SUPER SHIFT, K, Resize shorter,  resizeactive, 0 -100
bindd = SUPER SHIFT, L, Resize wider,    resizeactive, 100 0

# 7. Disable nightlight toggle (was: SUPER+CTRL+N toggles screen temperature)
unbind = SUPER CTRL, N

# 8. SUPER + SHIFT + S: region screenshot to clipboard
bindd = SUPER SHIFT, S, Region screenshot to clipboard, exec, omarchy capture screenshot region copy


# 10. SUPER + F: true fullscreen; SUPER + Z: maximize (fill screen, keep waybar + gaps)
unbind = SUPER, F
bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER, Z, Maximize, fullscreen, 1

# 11. ALT + SHIFT + V: clipboard history (was: SUPER+CTRL+V)
unbind = SUPER CTRL, V
bindd = ALT SHIFT, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# 12. macOS-style quit: ALT+Q kills all windows of the app, ALT+W / SUPER+Q close the focused window
bindd = ALT, Q, Quit app (all windows), exec, /home/tank/.local/bin/quit-app
bindd = ALT, W, Close tab in Chrome / window elsewhere, exec, /home/tank/.local/bin/mac-shortcut W killactive
bindd = SUPER, Q, Close window, killactive

# macOS-style ALT remaps. See /home/tank/.local/bin/mac-shortcut for the
# per-(app, key) routing table. Chrome: N/T/W/R/L/Shift+T/0..9. Ghostty: W/T/N/C/V.
bindd = ALT, N,       New window,    exec, /home/tank/.local/bin/mac-shortcut N
bindd = ALT, T,       New tab,       exec, /home/tank/.local/bin/mac-shortcut T
bindd = ALT SHIFT, T, Reopen tab,    exec, /home/tank/.local/bin/mac-shortcut Shift+T
bindd = ALT, R,       Reload,        exec, /home/tank/.local/bin/mac-shortcut R
bindd = ALT, L,       Address bar,   exec, /home/tank/.local/bin/mac-shortcut L
bindd = ALT, C,       Copy,          exec, /home/tank/.local/bin/mac-shortcut C
bindd = ALT, V,       Paste,         exec, /home/tank/.local/bin/mac-shortcut V
bindd = ALT, 1,       Tab 1, exec, /home/tank/.local/bin/mac-shortcut 1
bindd = ALT, 2,       Tab 2, exec, /home/tank/.local/bin/mac-shortcut 2
bindd = ALT, 3,       Tab 3, exec, /home/tank/.local/bin/mac-shortcut 3
bindd = ALT, 4,       Tab 4, exec, /home/tank/.local/bin/mac-shortcut 4
bindd = ALT, 5,       Tab 5, exec, /home/tank/.local/bin/mac-shortcut 5
bindd = ALT, 6,       Tab 6, exec, /home/tank/.local/bin/mac-shortcut 6
bindd = ALT, 7,       Tab 7, exec, /home/tank/.local/bin/mac-shortcut 7
bindd = ALT, 8,       Tab 8, exec, /home/tank/.local/bin/mac-shortcut 8
bindd = ALT, 9,       Tab 9, exec, /home/tank/.local/bin/mac-shortcut 9
bindd = ALT, 0,       Reset zoom,    exec, /home/tank/.local/bin/mac-shortcut 0
bindd = ALT, A,       Select all,    exec, hyprctl dispatch sendshortcut "CTRL,A,activewindow"

# Quick prompt -> claude in a floating terminal
unbind = SUPER SHIFT, SPACE
bindd = SUPER SHIFT, SPACE, Ask Claude, exec, /home/tank/.local/bin/ask-claude
windowrule = float on,       match:class ^(claude-ask)$
windowrule = size 1200 800,  match:class ^(claude-ask)$
windowrule = center on,      match:class ^(claude-ask)$

# 13. Quick web searches: ALT+G = Google, ALT+Y = YouTube
bindd = ALT, G, Search Google, exec, /home/tank/.local/bin/web-search google
bindd = ALT, Y, Search YouTube, exec, /home/tank/.local/bin/web-search youtube

# 14. Cycle window animation curve
bindd = SUPER ALT, minus, Pick animation curve, exec, /home/tank/.local/bin/hypr-cycle-anim pick
bindd = SUPER ALT, equal, Next animation curve, exec, /home/tank/.local/bin/hypr-cycle-anim next

# 15. CTRL + SUPER + SHIFT + hjkl: move window across split boundaries
#     (unlike SUPER+CTRL+hjkl which only swaps with the adjacent neighbor)
bindd = SUPER CTRL SHIFT, H, Move window left,  movewindow, l
bindd = SUPER CTRL SHIFT, J, Move window down,  movewindow, d
bindd = SUPER CTRL SHIFT, K, Move window up,    movewindow, u
bindd = SUPER CTRL SHIFT, L, Move window right, movewindow, r
