# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server
bindd = ALT SHIFT, G, Caption GIF, exec, gif-captioner

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Logitech MX Keys
# bind = SUPER SHIFT, S, exec, omarchy-capture-screenshot      # Print Screen Button
# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button

# === vim-centric window control ===
# Three-tier hjkl scheme:
#   SUPER             + hjkl  →  move focus
#   SUPER + SHIFT     + hjkl  →  resize active window
#   SUPER + CTRL+SHIFT+ hjkl  →  rearrange (swap with neighbor; re-parent if none)

# Tier 1 — focus
#   overrides: SUPER+J=toggle split, SUPER+K=show keybindings, SUPER+L=toggle workspace layout
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
bindd = SUPER, H, Focus left,  movefocus, l
bindd = SUPER, J, Focus down,  movefocus, d
bindd = SUPER, K, Focus up,    movefocus, u
bindd = SUPER, L, Focus right, movefocus, r

# Tier 3a — swap with the adjacent neighbor in that direction. No tree
# rewrite. Does nothing if there's no neighbor on that side.
bindd = SUPER CTRL, H, Swap left,  swapwindow, l
bindd = SUPER CTRL, J, Swap down,  swapwindow, d
bindd = SUPER CTRL, K, Swap up,    swapwindow, u
bindd = SUPER CTRL, L, Swap right, swapwindow, r

# Tier 3b — merge: re-parent the active window across split boundaries so it
# becomes a sibling of the neighbor's group in that direction. Use this to
# collapse a column/row (e.g. push a window out so its column-mate fills the
# column).
bindd = SUPER CTRL SHIFT, H, Merge left,  movewindow, l
bindd = SUPER CTRL SHIFT, J, Merge down,  movewindow, d
bindd = SUPER CTRL SHIFT, K, Merge up,    movewindow, u
bindd = SUPER CTRL SHIFT, L, Merge right, movewindow, r

# CTRL + SUPER + S: move active window to next monitor and follow focus
#   overrides: SUPER+CTRL+S=Share menu
unbind = SUPER CTRL, S
bindd = SUPER CTRL, S, Move window to next monitor, exec, hyprctl --batch "dispatch movewindow mon:+1 ; dispatch focusmonitor +1"

# Free up the stock 3-mod chords so nothing shadows our scheme.
unbind = SUPER CTRL, H
unbind = SUPER CTRL, L

# 4. ALT + SPACE: app launcher (walker), moved off SUPER+SPACE
unbind = SUPER, SPACE
bindd = ALT, SPACE, Vicinae, exec, vicinae toggle
bindd = ALT SHIFT, SPACE, Launch apps (walker), exec, omarchy-launch-walker

# 5. SUPER + TAB: launch or focus ghostty terminal
#    overrides: SUPER+TAB=Next workspace
unbind = SUPER, TAB
bindd = SUPER, TAB, Ghostty terminal, exec, omarchy-launch-or-focus ghostty

# 6. SUPER + SHIFT + hjkl: resize active window in direction
#    h: narrower (right edge moves left)   l: wider  (right edge moves right)
#    k: shorter  (bottom edge moves up)    j: taller (bottom edge moves down)
# hypr-resize-intuitive flips the sign when Hyprland's dwindle would
# otherwise resize the wrong direction (active in right subtree of its
# parent H-split).
bindde = SUPER SHIFT, H, Resize narrower, exec, hypr-resize-intuitive narrower 100
bindde = SUPER SHIFT, J, Resize taller,   exec, hypr-resize-intuitive taller 100
bindde = SUPER SHIFT, L, Resize wider,    exec, hypr-resize-intuitive wider 100

# SUPER+SHIFT+K = stock omarchy keybindings menu (SUPER+K is taken by Focus up).
# Note: drops Resize shorter from the hjkl scheme — use SUPER+SHIFT+J twice instead.
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings

# 7. Disable nightlight toggle (was: SUPER+CTRL+N toggles screen temperature)
unbind = SUPER CTRL, N

# 8a. ALT + SHIFT + S: region screenshot to clipboard.
bindd = ALT SHIFT, S, Region screenshot to clipboard, exec, omarchy capture screenshot region copy

# 8b. SUPER + SHIFT + S: toggle the focused window in/out of the scratchpad.
bindd = SUPER SHIFT, S, Toggle window in/out of scratchpad, exec, hypr-scratchpad-out

# 8c. CTRL + SHIFT + F1..F4: extra named scratchpads. Pair with the
#     scratchpad toggle script if you want F-row in/out toggles too.
bindd = CTRL SHIFT, F1, Scratchpad 1, togglespecialworkspace, scratch1
bindd = CTRL SHIFT, F2, Scratchpad 2, togglespecialworkspace, scratch2
bindd = CTRL SHIFT, F3, Scratchpad 3, togglespecialworkspace, scratch3
bindd = CTRL SHIFT, F4, Scratchpad 4, togglespecialworkspace, scratch4

# CTRL + SHIFT + ALT + F1..F4: send the focused window into the matching
# scratchpad (mirrors stock SUPER+ALT+S for the default scratchpad).
bindd = CTRL SHIFT ALT, F1, Send window to scratchpad 1, movetoworkspacesilent, special:scratch1
bindd = CTRL SHIFT ALT, F2, Send window to scratchpad 2, movetoworkspacesilent, special:scratch2
bindd = CTRL SHIFT ALT, F3, Send window to scratchpad 3, movetoworkspacesilent, special:scratch3
bindd = CTRL SHIFT ALT, F4, Send window to scratchpad 4, movetoworkspacesilent, special:scratch4


# 10. SUPER + F: true fullscreen; SUPER + Z: maximize (fill screen, keep waybar + gaps)
unbind = SUPER, F
bindd = SUPER, F, Fullscreen, fullscreen, 0
bindd = SUPER, Z, Maximize, fullscreen, 1

# Fill column / row: stash every window in the active's column (or row) to
# special:stash, so the active expands to fill it. Uses geometric overlap so
# it catches windows across arbitrary dwindle tree splits.
bindd = SUPER ALT, C, Fill column,            exec, hypr-fill column
bindd = SUPER ALT, R, Fill row,               exec, hypr-fill row
bindd = SUPER ALT, J, Toggle split orientation, layoutmsg, togglesplit
bindd = SUPER ALT, U, Restore stashed windows, exec, hypr-stash-restore

# 11. ALT + SHIFT + V: clipboard history (was: SUPER+CTRL+V)
unbind = SUPER CTRL, V
bindd = ALT SHIFT, V, Clipboard manager,    exec, vicinae deeplink vicinae://launch/clipboard/history
bindd = CTRL SHIFT, A, Browser tab switcher, exec, vicinae deeplink vicinae://launch/browser-extension/browse-tabs
bindd = CTRL ALT, SPACE, Emoji picker,      exec, vicinae deeplink vicinae://launch/core/search-emojis
bindd = ALT SHIFT, F, Fuzzy file search,     exec, vicinae deeplink 'vicinae://launch/@sameoldlab/store.vicinae.fuzzy-files/find'
bindd = CTRL ALT, M, Now Playing,            exec, vicinae deeplink 'vicinae://launch/@tank/now-playing/list'

# 12. macOS-style quit: ALT+Q kills all windows of the app, ALT+W / SUPER+Q close the focused window
bindd = ALT, Q, Quit app (all windows), exec, quit-app
bindd = ALT, W, Close tab in Chrome / window elsewhere, exec, mac-shortcut W killactive
bindd = SUPER, Q, Close window, killactive

# macOS-style ALT remaps. See mac-shortcut for the
# per-(app, key) routing table. Chrome: N/T/W/R/L/Shift+T/0..9. Ghostty: W/T/N/C/V.
bindd = ALT, N,       New window,    exec, mac-shortcut N
bindd = ALT, T,       New tab,       exec, mac-shortcut T
bindd = ALT SHIFT, T, Reopen tab,    exec, mac-shortcut Shift+T
bindd = ALT, R,       Reload,        exec, mac-shortcut R
bindd = ALT, L,       Address bar,   exec, mac-shortcut L
bindd = ALT, C,       Copy,          exec, mac-shortcut C
bindd = ALT, V,       Paste,         exec, mac-shortcut V
bindd = ALT, X,       Cut,           exec, mac-shortcut X
bindd = ALT, 1,       Tab 1, exec, mac-shortcut 1
bindd = ALT, 2,       Tab 2, exec, mac-shortcut 2
bindd = ALT, 3,       Tab 3, exec, mac-shortcut 3
bindd = ALT, 4,       Tab 4, exec, mac-shortcut 4
bindd = ALT, 5,       Tab 5, exec, mac-shortcut 5
bindd = ALT, 6,       Tab 6, exec, mac-shortcut 6
bindd = ALT, 7,       Tab 7, exec, mac-shortcut 7
bindd = ALT, 8,       Tab 8, exec, mac-shortcut 8
bindd = ALT, 9,       Tab 9, exec, mac-shortcut 9
bindd = ALT, 0,       Reset zoom,    exec, mac-shortcut 0
bindd = ALT, A,       Select all,    exec, hyprctl dispatch sendshortcut "CTRL,A,activewindow"

# Quick prompt -> claude in a floating terminal
unbind = SUPER SHIFT, SPACE
bindd = SUPER SHIFT, SPACE, Ask Claude, exec, ask-claude

# F8 = toggle Ask Claude with /omarchy skill prepended. Tap to start, tap again to stop + launch.
bindd = , F8, Ask Claude voice omarchy toggle, exec, ask-claude-voice-toggle /omarchy

# SHIFT+F8 = plain Ask Claude voice toggle (no skill prefix).
bindd = SHIFT, F8, Ask Claude (voice) toggle, exec, ask-claude-voice-toggle

# F9 = toggle dictation (en). Wrapper registers a transient ESC cancel
# binding while recording so cancel costs nothing when idle.
unbind = , F9
bindd = , F9, Toggle dictation, exec, voxtype-toggle en

# SHIFT+F9 = toggle dictation in pt-br.
bindd = SHIFT, F9, Toggle dictation pt-br, exec, voxtype-toggle pt
windowrule = float on,       match:class ^(claude-ask)$
windowrule = size 1200 800,  match:class ^(claude-ask)$
windowrule = center on,      match:class ^(claude-ask)$

# 13. Quick web searches: ALT+G = Google, ALT+Y = YouTube
bindd = ALT, G, Search Google, exec, web-search google
bindd = ALT, Y, Search YouTube, exec, web-search youtube

# 14. Cycle window animation curve
bindd = SUPER ALT, minus, Pick animation curve, exec, hypr-cycle-anim pick
bindd = SUPER ALT, equal, Next animation curve, exec, hypr-cycle-anim next

