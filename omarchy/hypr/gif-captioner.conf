# gif-captioner TUI popup styling. Same pattern as the omarchy bluetui/wiremix
# windows: tag floating-window → float on + center + size, then override size
# to give the gif grid + preview room to breathe.
windowrule = tag +floating-window, match:class (org.omarchy.gif-captioner-tui)
windowrule = size 1280 820,        match:class (org.omarchy.gif-captioner-tui)
