# Extra autostart processes
# exec-once = uwsm-app -- my-service

# vicinae: Raycast-like launcher daemon; bound to Alt+Space via toggle.
# Also handles clipboard history via deeplink (see bindings.conf).
exec-once = vicinae server

# Restore the "boot" hyprflow session. Re-save it with `hyprflow save -f boot`
# (or run the `session-save` wrapper) whenever the boot layout should change.
exec-once = bash -c 'sleep 4 && session-restore-boot'
