# cryptic-wand TUI popup styling — terminal app-id set by omarchy-launch-tui.
# The base floating/pop rules already match org.omarchy.* via system.conf;
# this file just bumps the size so the GIF grid has room.
windowrule = size 1100 720, match:class (org.omarchy.cryptic-wand-tui)
windowrule = center on, match:class (org.omarchy.cryptic-wand-tui)
